# Site Build Settings

# GitHub Pages (proyecto: walalapancho/GuiaParaPadres)
url: "https://walalapancho.github.io"
baseurl: "/GuiaParaPadres"
repository: "walalapancho/GuiaParaPadres"

# Jekyll-paginate-v2 configuration
#  pagination:
#   enabled: true
#   per_page: 5
#   permalink: '/page/:num/'
#   title: ':title - page :num of :max'
#   limit: 0
#   sort_field: 'date'
#   sort_reverse: true

# jekyll-paginate configuration
paginate:            5

# Build settings
markdown:            kramdown
highlighter:         rouge
permalink:           /:title
plugins:             [jekyll-paginate, jekyll-sitemap, jekyll-feed, jekyll-seo-tag]

# Site identity (appears in header, footer, SEO, and RSS feed)
title:               '🛡️ Seguridad Digital Familiar'
description:         'Biblioteca integral de recursos sobre seguridad digital para padres, educadores y comunidades'
author:              'GuiaParaPadres'
lang:                'es'

# Exclude directories/files that should not be processed
exclude:
  - theme/
  - registro de cambios/
  - menu/
  - _posts/
  - startup.log
  - verify_links_comprehensive.py
  - serve.sh
  - "*.py"
  - README.md
  - LICENSE.md
  - developers.md
  - AGENTS.md
  - presentacion-uso-saludable-tecnologia.md
  - .content-template.md
  - lagrange.gemspec
  - Gemfile.ghpages
  - Gemfile.ghpages.lock
  - rss-feed.xml
  - check_links.py
  - fix_links.py
  - fix_links_v2.py
  - fix_links_v3.py
  - fix_links_v4.py

# RSS 2.0 can be used instead of Atom by uncommenting following two lines
#feed:
#  path: rss-feed.xml
